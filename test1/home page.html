<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>يسلمو - توصيل الطلبات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff6b35 0%, #f08a4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            padding: 10px;
        }

        /* رسومات SVG في الخلفية - تظهر بشكل مناسب في جميع الشاشات */
        .delivery-svg-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .svg-truck,
        .svg-motorcycle,
        .svg-package,
        .svg-location {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .svg-truck {
            top: 5%;
            left: 3%;
            width: clamp(80px, 15vw, 150px);
            height: clamp(80px, 15vw, 150px);
        }

        .svg-motorcycle {
            bottom: 5%;
            right: 3%;
            width: clamp(70px, 13vw, 130px);
            height: clamp(70px, 13vw, 130px);
            animation: float 8s ease-in-out infinite reverse;
        }

        .svg-package {
            top: 15%;
            right: 5%;
            width: clamp(60px, 10vw, 100px);
            height: clamp(60px, 10vw, 100px);
        }

        .svg-location {
            bottom: 15%;
            left: 5%;
            width: clamp(70px, 12vw, 120px);
            height: clamp(70px, 12vw, 120px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 1200px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .logo {
            margin-bottom: clamp(15px, 4vh, 30px);
            animation: slideDown 1s ease-out;
        }

        .logo h1 {
            font-size: clamp(2.5rem, 15vw, 5rem);
            color: white;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.1);
            font-weight: 900;
            margin-bottom: 5px;
            letter-spacing: 2px;
            line-height: 1.2;
            word-break: break-word;
        }

        .logo span {
            font-size: clamp(0.8rem, 4vw, 1.3rem);
            color: rgba(255, 255, 255, 0.9);
            display: block;
            letter-spacing: 3px;
            font-weight: 300;
        }

        .slogan {
            font-size: clamp(1.2rem, 6vw, 2.5rem);
            color: white;
            margin-bottom: clamp(10px, 3vh, 20px);
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            animation: slideUp 1s ease-out 0.3s both;
            line-height: 1.4;
            padding: 0 10px;
        }

        .description {
            color: rgba(255, 255, 255, 0.95);
            font-size: clamp(0.9rem, 4vw, 1.3rem);
            margin-bottom: clamp(20px, 5vh, 50px);
            line-height: 1.6;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            animation: slideUp 1s ease-out 0.5s both;
            padding: 0 15px;
        }

        /* SVG أيقونات الخدمات - متجاوبة بالكامل */
        .features {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 3vw, 50px);
            margin-bottom: clamp(20px, 5vh, 50px);
            flex-wrap: wrap;
            animation: slideUp 1s ease-out 0.7s both;
            padding: 0 10px;
        }

        .feature-item {
            text-align: center;
            padding: clamp(10px, 3vw, 20px);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            width: clamp(120px, 30vw, 180px);
            transition: transform 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
        }

        .feature-svg {
            width: clamp(40px, 12vw, 80px);
            height: clamp(40px, 12vw, 80px);
            margin: 0 auto clamp(5px, 2vh, 15px);
        }

        .feature-svg svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.2));
        }

        .feature-text {
            color: white;
            font-size: clamp(0.8rem, 3.5vw, 1.2rem);
            font-weight: 600;
            line-height: 1.4;
        }

        /* زر بدون تأثيرات حركية */
        .btn-create-order {
            background: white;
            color: #ff6b35;
            border: none;
            padding: clamp(12px, 3vh, 20px) clamp(30px, 8vw, 60px);
            font-size: clamp(1.1rem, 5vw, 2rem);
            border-radius: 60px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            font-weight: bold;
            margin-bottom: clamp(15px, 4vh, 30px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            display: inline-block;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-create-order:hover {
            background: #fff8f0;
            transform: scale(1.02);
        }

        .btn-create-order:active {
            transform: scale(0.98);
            background: #f5f5f5;
        }

        .footer {
            margin-top: clamp(15px, 4vh, 50px);
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(0.7rem, 3vw, 1.1rem);
            animation: fadeIn 1s ease-out 1.1s both;
            padding: 0 10px;
        }

        .footer a {
            color: white;
            text-decoration: none;
            margin: 0 5px;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
            display: inline-block;
            padding: 2px 0;
        }

        .footer a:hover {
            border-bottom-color: white;
        }

        .footer br {
            display: none;
        }

        .footer .links {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* تحسينات للشاشات الصغيرة جداً */
        @media (max-width: 380px) {
            .feature-item {
                width: calc(50% - 10px);
                min-width: 120px;
            }
            
            .features {
                gap: 8px;
            }

            .btn-create-order {
                width: 90%;
                padding: 12px 20px;
            }
        }

        /* تحسينات للشاشات المتوسطة */
        @media (min-width: 768px) and (max-width: 1024px) {
            .feature-item {
                width: 160px;
            }
            
            .container {
                max-width: 90%;
            }
        }

        /* تحسينات للشاشات الكبيرة */
        @media (min-width: 1400px) {
            .container {
                max-width: 1400px;
            }
            
            .feature-item {
                width: 200px;
            }
            
            .feature-svg {
                width: 100px;
                height: 100px;
            }
        }

        /* تحسينات للأجهزة التي تعمل باللمس */
        @media (hover: none) and (pointer: coarse) {
            .btn-create-order:hover {
                background: white;
                transform: none;
            }
            
            .feature-item:hover {
                transform: none;
            }
            
            .btn-create-order:active {
                background: #fff8f0;
                transform: scale(0.98);
            }
        }

        /* تحسين اتجاه النص للأرقام */
        .footer .links a {
            unicode-bidi: plaintext;
        }
    </style>
</head>
<body>
    <!-- رسومات SVG في الخلفية -->
    <div class="delivery-svg-bg">
        <!-- شاحنة توصيل -->
        <div class="svg-truck">
            <svg viewBox="0 0 24 24" fill="white">
                <path d="M18 18.5C18 19.6 17.1 20.5 16 20.5C14.9 20.5 14 19.6 14 18.5C14 17.4 14.9 16.5 16 16.5C17.1 16.5 18 17.4 18 18.5ZM6 18.5C6 19.6 5.1 20.5 4 20.5C2.9 20.5 2 19.6 2 18.5C2 17.4 2.9 16.5 4 16.5C5.1 16.5 6 17.4 6 18.5ZM20 4V6H22V8H20V10H18V8H16V6H18V4H20ZM6.5 7H10.5V9H8V13H6.5V7Z"/>
            </svg>
        </div>

        <!-- دراجة توصيل -->
        <div class="svg-motorcycle">
            <svg viewBox="0 0 24 24" fill="white">
                <path d="M8.5 19C8.5 20.1 7.6 21 6.5 21C5.4 21 4.5 20.1 4.5 19C4.5 17.9 5.4 17 6.5 17C7.6 17 8.5 17.9 8.5 19ZM17.5 17C16.4 17 15.5 17.9 15.5 19C15.5 20.1 16.4 21 17.5 21C18.6 21 19.5 20.1 19.5 19C19.5 17.9 18.6 17 17.5 17ZM5.5 12L7.5 8H11.5V6H6.5L4 12H5.5ZM19.5 12C18.7 12 17.9 12.2 17.2 12.6L14.9 9.5L18.5 4H14.5L11.7 8.4L13.5 11C12.3 12 11.5 13.4 11.5 15V16H18.5C20.4 16 22 14.4 22 12.5V12H19.5Z"/>
            </svg>
        </div>

        <!-- صندوق/طرود -->
        <div class="svg-package">
            <svg viewBox="0 0 24 24" fill="white">
                <path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19ZM13 7H7V9H13V7ZM17 11H7V13H17V11Z"/>
            </svg>
        </div>

        <!-- علامة موقع -->
        <div class="svg-location">
            <svg viewBox="0 0 24 24" fill="white">
                <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z"/>
            </svg>
        </div>
    </div>

    <div class="container">
        <div class="logo">
            <h1>يسلمو</h1>
            <span>YSLMOU</span>
        </div>

        <h2 class="slogan">توصيل كافة الطلبيات إلى المنازل</h2>
        
        <p class="description">
            نوصلك كل ما تحتاجه من متاجرك المفضلة إلى باب منزلك بسرعة وأمان
        </p>

        <!-- SVG أيقونات الخدمات -->
        <div class="features">
            <div class="feature-item">
                <div class="feature-svg">
                    <svg viewBox="0 0 24 24" fill="white">
                        <path d="M18 18.5C18 19.6 17.1 20.5 16 20.5C14.9 20.5 14 19.6 14 18.5C14 17.4 14.9 16.5 16 16.5C17.1 16.5 18 17.4 18 18.5ZM6 18.5C6 19.6 5.1 20.5 4 20.5C2.9 20.5 2 19.6 2 18.5C2 17.4 2.9 16.5 4 16.5C5.1 16.5 6 17.4 6 18.5ZM20 4V6H22V8H20V10H18V8H16V6H18V4H20ZM6.5 7H10.5V9H8V13H6.5V7Z"/>
                    </svg>
                </div>
                <div class="feature-text">توصيل سريع</div>
            </div>
            <div class="feature-item">
                <div class="feature-svg">
                    <svg viewBox="0 0 24 24" fill="white">
                        <path d="M12 1L3 5V11C3 16.55 6.84 21.74 12 23C17.16 21.74 21 16.55 21 11V5L12 1ZM12 11.99H19C18.47 16.11 15.72 19.78 12 20.93V12H5V6.3L12 3.19V11.99Z"/>
                    </svg>
                </div>
                <div class="feature-text">الدفع عند الاستلام</div>
            </div>
            <div class="feature-item">
                <div class="feature-svg">
                    <svg viewBox="0 0 24 24" fill="white">
                        <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z"/>
                    </svg>
                </div>
                <div class="feature-text">تتبع الطلب</div>
            </div>
        </div>

        <button class="btn-create-order" onclick="createOrder()">
            إنشاء طلب جديد
        </button>

        <div class="footer">
            <div>© 2024 يسلمو - جميع الحقوق محفوظة</div>
            <div class="links">
                <a href="#">الشروط والأحكام</a>
                <span style="color: rgba(255,255,255,0.5);">|</span>
                <a href="#">سياسة الخصوصية</a>
            </div>
        </div>
    </div>

    <script>
        function createOrder() {
            alert('تم الضغط على زر إنشاء طلب - جاري تحويلك إلى صفحة إنشاء الطلب');
            // window.location.href = '/create-order';
        }

        // تحسين إضافي للشاشات الصغيرة جداً
        function adjustLayout() {
            const width = window.innerWidth;
            const features = document.querySelector('.features');
            
            if (width <= 380 && features) {
                // التأكد من أن العناصر تظهر بشكل مناسب
                document.documentElement.style.setProperty('--feature-width', 'calc(50% - 10px)');
            }
        }

        window.addEventListener('load', adjustLayout);
        window.addEventListener('resize', adjustLayout);
    </script>
</body>
</html>
